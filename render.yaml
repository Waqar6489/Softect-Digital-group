services:
  - type: web
    name: softech-digital-group
    env: python
    rootDir: Backend
    buildCommand: pip install -r requirements.txt && cd ../Frontend && npm install && npm run build
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 5000
